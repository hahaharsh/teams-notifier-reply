<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#5b5fc7">
<title>Reply – Teams Notifier</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0; padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f3f3f7; color: #222; min-height: 100vh;
  }
  .card {
    max-width: 480px; margin: 0 auto; background: #fff;
    border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.06);
    padding: 18px;
  }
  h1 { margin: 0 0 4px; font-size: 13px; color: #5b5fc7; letter-spacing: .04em; text-transform: uppercase; }
  .who { margin: 0 0 14px; font-size: 20px; font-weight: 600; word-break: break-word; }
  .preview {
    margin: 0 0 14px; padding: 10px 12px; background: #eef0fb;
    border-left: 3px solid #5b5fc7; border-radius: 6px;
    font-size: 14px; color: #333; white-space: pre-wrap; word-break: break-word;
    max-height: 130px; overflow-y: auto;
  }
  textarea {
    width: 100%; min-height: 150px; padding: 12px; font: inherit;
    border: 1px solid #ccd; border-radius: 10px; resize: vertical;
    background: #fafaff; outline-color: #5b5fc7;
  }
  textarea:focus { background: #fff; }
  .row { display: flex; gap: 8px; margin-top: 12px; }
  button {
    flex: 1; padding: 14px; font: inherit; font-weight: 600;
    background: #5b5fc7; color: #fff; border: 0; border-radius: 10px; cursor: pointer;
  }
  button.secondary { background: #e7e7ee; color: #444; flex: 0 0 auto; padding-inline: 16px; }
  button:disabled { opacity: .5; }
  .status { margin: 12px 0 0; font-size: 14px; min-height: 1.4em; }
  .ok  { color: #1e7e34; }
  .err { color: #c93939; }
  .small { font-size: 12px; color: #666; margin-top: 8px; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
             overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>
</head>
<body>
<div class="card">
  <h1>📣 Teams Notifier</h1>
  <p class="who" id="who">Reply</p>
  <div class="preview" id="preview" hidden></div>
  <label for="text" class="sr-only">Reply text</label>
  <textarea id="text" placeholder="Type your reply…" autocomplete="off"></textarea>
  <div class="row">
    <button id="send" type="button">Send</button>
    <button id="clear" type="button" class="secondary" title="Clear text">✕</button>
  </div>
  <p class="status" id="status"></p>
  <p class="small" id="hint">Your desktop browser will type this into Teams.</p>
</div>
<script>
(function () {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const p = new URLSearchParams(location.search);

  const cfg = {
    server:  (p.get("server")  || "https://ntfy.sh").replace(/\/$/, ""),
    topic:   p.get("topic")   || "",
    secret:  p.get("secret")  || "",
    chat:    p.get("chat")    || "",
    name:    p.get("name")    || "",
    preview: p.get("preview") || ""
  };

  document.title = cfg.name ? "Reply to " + cfg.name : "Reply – Teams Notifier";
  $("who").textContent = cfg.name ? "Reply to " + cfg.name : "Reply";
  if (cfg.preview) {
    $("preview").hidden = false;
    $("preview").textContent = cfg.preview;
  }
  if (!cfg.topic) {
    setStatus("Missing reply topic in URL — open this page only via the Reply button on a Teams Notifier push.", "err");
    $("send").disabled = true;
  }

  function setStatus(msg, cls) {
    const el = $("status");
    el.textContent = msg || "";
    el.className = "status " + (cls || "");
  }

  async function send() {
    const body = $("text").value.trim();
    if (!body) return;
    $("send").disabled = true;
    setStatus("Sending…");
    try {
      const url = cfg.server + "/" + encodeURIComponent(cfg.topic);
      const payload = { v: 1, kind: "reply", secret: cfg.secret, chat: cfg.chat, name: cfg.name, text: body, ts: Date.now() };
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "text/plain", "X-Title": "tn-reply" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      setStatus("Sent ✓ — desktop should deliver it within a second.", "ok");
      $("text").value = "";
    } catch (e) {
      setStatus("Failed: " + e.message, "err");
    } finally {
      $("send").disabled = false;
    }
  }

  $("send").addEventListener("click", send);
  $("clear").addEventListener("click", () => { $("text").value = ""; $("text").focus(); });
  $("text").addEventListener("keydown", (e) => {
    // Ctrl/Cmd + Enter sends
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); send(); }
  });
  setTimeout(() => $("text").focus(), 100);
})();
</script>
</body>
</html>
