<!DOCTYPE html>
<!--
  Teams Notifier — Phone webapp (GitHub Pages edition)

  A single static HTML file. No backend. No build step. No tunnel.

  How it works
  ────────────
    Extension (laptop)
       │  POST ntfy.sh/<notifTopic>
       ▼
    ntfy.sh ─── subscribe ───► THIS PAGE on your phone   ◄── read chats / type reply
       │                                                       │
       │  POST ntfy.sh/<replyTopic>  ◄────────── compose ──────┘
       ▼
    Extension (laptop) subscribes to replyTopic, types into Teams.

  No data ever flows phone → laptop directly. Everything goes via ntfy.sh,
  which is the same channel you're already trusting for notifications. Works
  from cellular, hotel WiFi, anywhere — the page only needs to reach ntfy.sh.

  Deploy
  ──────
    1. Create a public GitHub repo, e.g.  teams-notifier-phone
    2. Add this file as  index.html  (also add manifest.webmanifest from the
       same folder if you want PWA install support)
    3. Settings → Pages → Branch: main, folder: / (root) → Save
    4. Visit  https://<you>.github.io/teams-notifier-phone/  on your phone
    5. Enter your ntfy server / notif topic / reply topic / secret. Save.
    6. Add to Home Screen.
-->

<style>
  :root {
    --bg:#f3f4fb; --bg-panel:#fff; --bg-side:#ebebf4;

  /* ── Setup screen ─────────────────────────────────────────────── */

  /* Main pane */

  .main-head {

  .main-title { flex:1; min-width:0; }

  .msg .when { margin-top:4px; font-size:11px; color:var(--fg-dim); display:flex; gap:8px; }

  .day-divider { text-align:center; font-size:11px; color:var(--fg-dim); letter-spacing:.08em; text-transform:uppercase; margin:4px 0; }

  /* Composer */
  .composer {
    background:var(--bg-panel); border-top:1px solid var(--border);

  #sendBtn { background:var(--accent); color:#fff; border:0; padding:10px 18px; border-radius:8px; font-weight:600; }

  .mobile-only { display:none; }

  /* Mobile */
  @media (max-width: 800px) {

</style>

<body>
<div id="root">
  <div id="bootMsg" style="max-width:480px;margin:80px auto;padding:24px;font:14px/1.5 -apple-system,sans-serif;color:#444;text-align:center;">
    <div style="font-size:48px;margin-bottom:12px;">📺</div>
    <h1 style="color:#5b5fc7;font-size:18px;margin:0 0 8px;">Teams Notifier — phone</h1>
    <p>Loading…</p>
    <p style="font-size:12px;color:#888;margin-top:24px;">
      Still seeing this after a few seconds? Open DevTools → Console and check
      for errors, or see the troubleshooting section in
      <a href="https://github.com/" style="color:#5b5fc7;">the README</a>.
    </p>
  </div>
</div>
<noscript>
  <div style="max-width:480px;margin:80px auto;padding:24px;font:14px/1.5 -apple-system,sans-serif;color:#c93939;text-align:center;border:1px solid #f4d4d4;border-radius:8px;">
    <strong>JavaScript is required.</strong><br>
    This page is a small SPA that subscribes to your ntfy topic for chat history
    and publishes replies. Enable JavaScript and reload.
  </div>
</noscript>

<script>
"use strict";

/* ─────────────────────────────────────────────────────────────────────────
 *  Helpers
 * ───────────────────────────────────────────────────────────────────────── */

const $ = (id) => document.getElementById(id);
const h = (tag, attrs = {}, ...children) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === "class")            el.className = v;
    else if (k === "style")       Object.assign(el.style, v);
    else if (k.startsWith("on"))  el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "html")        el.innerHTML = v;
    else if (v === true)          el.setAttribute(k, "");
    else                          el.setAttribute(k, v);
  }
  for (const c of children.flat(Infinity)) {
    if (c == null || c === false) continue;
    el.append(c instanceof Node ? c : document.createTextNode(c));
  }
  return el;
};

const escape = (s) => String(s ?? "").replace(/[&<>"']/g,
  (c) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));

const initials = (name) => {
  const parts = String(name || "?").trim().split(/\s+/).slice(0, 2);
  return parts.map((p) => p[0] || "").join("").toUpperCase() || "?";
};

const fmtTime = (ts) => {
  if (!ts) return "";
  const d = new Date(ts);
  const today = new Date(); today.setHours(0,0,0,0);
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  if (d >= today) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  if (d >= yest)  return "yesterday";
  return d.toLocaleDateString([], { month: "short", day: "numeric" });
};

const dayLabel = (ts) => {
  const d = new Date(ts);
  const today = new Date(); today.setHours(0,0,0,0);
  const yest = new Date(today); yest.setDate(yest.getDate() - 1);
  if (d >= today) return "Today";
  if (d >= yest)  return "Yesterday";
  return d.toLocaleDateString([], { weekday: "short", month: "short", day: "numeric",
    year: d.getFullYear() === today.getFullYear() ? undefined : "numeric" });
};

const isMobile = () => window.matchMedia("(max-width: 800px)").matches;

/* ─────────────────────────────────────────────────────────────────────────
 *  Persistence (localStorage)
 * ───────────────────────────────────────────────────────────────────────── */

const KEY_CFG  = "tn-cfg-v1";
const KEY_MSGS = "tn-msgs-v1";
const KEY_OUT  = "tn-out-v1";

function loadCfg() {
  try { return JSON.parse(localStorage.getItem(KEY_CFG) || "null"); } catch { return null; }
}
function saveCfg(c)  { localStorage.setItem(KEY_CFG,  JSON.stringify(c)); }
function clearCfg()  { localStorage.removeItem(KEY_CFG); localStorage.removeItem(KEY_MSGS); localStorage.removeItem(KEY_OUT); }

function loadMsgsCache() {
  try { return JSON.parse(localStorage.getItem(KEY_MSGS) || "[]"); } catch { return []; }
}
function saveMsgsCache(arr) {
  // Keep most recent 500
  const trimmed = arr.slice(-500);
  localStorage.setItem(KEY_MSGS, JSON.stringify(trimmed));
}
function loadOut() {
  try { return JSON.parse(localStorage.getItem(KEY_OUT) || "[]"); } catch { return []; }
}
function saveOut(arr) {
  localStorage.setItem(KEY_OUT, JSON.stringify(arr.slice(-100)));
}

/* Captures config from URL on first visit, then strips secrets from the
 * address bar so they don't leak into browser history / accidental shares. */
function captureUrlConfig() {
  const q   = new URLSearchParams(location.search);
  const cur = loadCfg() || {};
  let updated = false;
  const map = {
    server:      "server",
    notifTopic:  "notifTopic",
    replyTopic:  "replyTopic",
    secret:      "secret"
  };
  // Backward-compat: extension's reply URL builder uses 'topic' for the reply topic.
  if (!cur.replyTopic && q.get("topic")) { cur.replyTopic = q.get("topic"); updated = true; }
  for (const [param, key] of Object.entries(map)) {
    const v = q.get(param);
    if (v && cur[key] !== v) { cur[key] = v; updated = true; }
  }
  if (updated) saveCfg(cur);

  // Strip sensitive params from the URL
  let touched = false;
  for (const k of ["server", "topic", "notifTopic", "replyTopic", "secret"]) {
    if (q.has(k)) { q.delete(k); touched = true; }
  }
  if (touched) {
    const qs = q.toString();
    history.replaceState({}, "", location.pathname + (qs ? "?" + qs : "") + location.hash);
  }
  return cur;
}

/* ─────────────────────────────────────────────────────────────────────────
 *  ntfy subscribe + publish
 * ───────────────────────────────────────────────────────────────────────── */

let subAbort = null;

async function startSubscribe(cfg, onMessage, onState) {
  if (subAbort) { try { subAbort.abort(); } catch {} }
  if (!cfg.server || !cfg.notifTopic) { onState("err", "missing server/topic"); return; }

  const ctrl = new AbortController();
  subAbort = ctrl;
  let backoff = 1000;
  const SINCE = "12h"; // backfill window — ntfy default retention is 12h

  (async () => {
    while (!ctrl.signal.aborted) {
      try {
        onState("connecting");
        const base = `${cfg.server.replace(/\/$/, "")}/${encodeURIComponent(cfg.notifTopic)}/json`;
        const res = await fetch(`${base}?since=${SINCE}`, { signal: ctrl.signal });
        if (!res.ok || !res.body) throw new Error("HTTP " + res.status);
        onState("ok");
        backoff = 1000;
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        while (!ctrl.signal.aborted) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let nl;
          while ((nl = buf.indexOf("\n")) !== -1) {
            const line = buf.slice(0, nl).trim();
            buf = buf.slice(nl + 1);
            if (!line) continue;
            try {
              const evt = JSON.parse(line);
              if (evt.event && evt.event !== "message") continue; // ignore "open" / "keepalive"
              onMessage(evt);
            } catch { /* skip malformed line */ }
          }
        }
      } catch (e) {
        if (ctrl.signal.aborted) return;
        onState("err", e?.message || "disconnected");
      }
      await new Promise((r) => setTimeout(r, backoff));
      backoff = Math.min(backoff * 2, 30000);
    }
  })();
}

async function publishReply(cfg, chatUrl, chatName, text) {
  if (!cfg.server || !cfg.replyTopic) throw new Error("reply topic not configured");
  const url = `${cfg.server.replace(/\/$/, "")}/${encodeURIComponent(cfg.replyTopic)}`;
  const payload = {
    v: 1, kind: "reply",
    secret: cfg.secret || "",
    chat:   chatUrl || null,
    name:   chatName || null,
    text,
    ts:     Date.now()
  };
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "text/plain", "X-Title": "tn-reply" },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return true;
}

/* ─────────────────────────────────────────────────────────────────────────
 *  Message parsing — turn an ntfy event into a chat message
 * ───────────────────────────────────────────────────────────────────────── */

// Most notifications from the extension look like:
//   title: "💬 Alice Smith"
//   body:  "Hey, free at 3?"
//   click: "https://teams.microsoft.com/l/chat/.../users=alice"
//
// Strip the leading emoji from the title for sender name, and group chats by
// click URL (falls back to sender name when no URL is available).
function parseEvent(evt) {
  const rawTitle = evt.title || "";
  let body       = evt.message || "";
  // Skip our own reply echo (the extension's reply-publish messages)
  if (evt.title === "tn-reply" || /^tn-reply/i.test(evt.title || "")) return null;

  let sender = rawTitle
    .replace(/^[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\s]+/u, "")
    .trim() || "Teams";

  // Recovery: pre-1.1.0 notifications had title="Microsoft Teams" with the
  // real sender stuffed in the body ("Alice: Hey…"). Re-parse so legacy
  // entries still in ntfy's 12h retention window render correctly.
  if (/^microsoft\s*teams$/i.test(sender) || /^teams$/i.test(sender)) {
    const nl = body.indexOf("\n");
    const co = body.indexOf(": ");
    if (nl > 0 && nl <= 80) {
      sender = body.slice(0, nl).trim() || sender;
      body   = body.slice(nl + 1).trim();
    } else if (co > 0 && co <= 60) {
      const lhs = body.slice(0, co).trim();
      if (!/^https?$/i.test(lhs) && !/^\d+$/.test(lhs)) {
        sender = lhs;
        body   = body.slice(co + 2).trim();
      }
    }
  }

  const chatUrl = extractChatUrl(evt.click);
  const chatKey = chatUrl || sender;
  return {
    id:      evt.id || `${evt.time || Date.now()}-${Math.random().toString(36).slice(2,8)}`,
    ts:      (evt.time ? evt.time * 1000 : Date.now()),
    sender, body, chatUrl, chatKey,
    rawTitle
  };
}

/**
 * The desktop extension sends ntfy events with:
 *   click = "https://<you>.github.io/teams-notifier-reply/?chat=<TEAMS_URL>&server=…&secret=…"
 *
 * i.e. the click URL points at THIS webapp (so tapping the push opens us
 * pre-loaded with config), and the actual Teams chat URL is wrapped inside
 * as the `chat` query param. We need that inner Teams URL — both for
 * grouping messages by conversation AND so when we publish a reply, the
 * extension knows which chat to type into.
 *
 * Falls back to evt.click as-is for legacy events whose click was a direct
 * Teams URL (pre-2.0 extension, or manually-sent ntfy messages).
 */
function extractChatUrl(click) {
  if (!click) return null;
  try {
    const u = new URL(click);
    const inner = u.searchParams.get("chat");
    if (inner) return inner;
    // Legacy / direct: click was the Teams URL itself
    if (/teams\.microsoft\.com|teams\.cloud\.microsoft|cloud\.microsoft/i.test(u.hostname)) {
      return click;
    }
    // Anything else (e.g. an unrelated github.io URL) — don't pretend it's a chat
    return null;
  } catch {
    return click;
  }
}

/* ─────────────────────────────────────────────────────────────────────────
 *  In-memory state + chat aggregation
 * ───────────────────────────────────────────────────────────────────────── */

const state = {
  cfg: null,
  messages: new Map(),   // id → msg
  chats:    new Map(),   // chatKey → { name, count, lastTs, lastBody, lastSender, chatUrl, unread }
  outgoing: [],          // [{ id, ts, chatKey, text, status }]
  selected: null,
  search:   "",
  connState: "init",     // "init" | "connecting" | "ok" | "err"
  connErr:   ""
};

function upsertChat(m) {
  let c = state.chats.get(m.chatKey);
  if (!c) {
    c = {
      chatKey: m.chatKey, name: m.sender, count: 0,
      lastTs: 0, lastBody: "", lastSender: null,
      chatUrl: m.chatUrl || null, unread: 0
    };
    state.chats.set(m.chatKey, c);
  }
  c.count++;
  if (m.ts > c.lastTs) {
    c.lastTs = m.ts;
    c.lastBody = m.body;
    c.lastSender = m.sender;
    c.name = m.sender;
  }
  if (!c.chatUrl && m.chatUrl) c.chatUrl = m.chatUrl;
  if (state.selected !== m.chatKey) c.unread++;
}

function ingest(m) {
  if (!m || state.messages.has(m.id)) return false;
  state.messages.set(m.id, m);
  upsertChat(m);
  return true;
}

function hydrateFromCache() {
  for (const m of loadMsgsCache()) ingest(m);
  state.outgoing = loadOut();
}

function persistMessages() {
  const all = [...state.messages.values()].sort((a, b) => a.ts - b.ts);
  saveMsgsCache(all);
}

function chatsSnapshot() {
  return [...state.chats.values()].sort((a, b) => b.lastTs - a.lastTs);
}

function messagesForChat(key) {
  const all = [];
  for (const m of state.messages.values()) if (m.chatKey === key) all.push({ ...m, _kind: "in" });
  for (const o of state.outgoing)          if (o.chatKey === key) all.push({ ...o, _kind: "out" });
  return all.sort((a, b) => (a.ts || 0) - (b.ts || 0));
}

/* ─────────────────────────────────────────────────────────────────────────
 *  Render
 * ───────────────────────────────────────────────────────────────────────── */

const root = $("root");

function render() {
  if (!state.cfg || !state.cfg.notifTopic || !state.cfg.replyTopic) {
    return renderSetup();
  }
  renderApp();
}

/* ----- Setup screen ----- */

function renderSetup() {
  root.innerHTML = "";
  const existing = state.cfg || {};
  const form = h("form", { onsubmit: handleSetupSubmit },
    h("label", {},
      h("span", {}, "ntfy server"),
      h("input", { name: "server", type: "url", value: existing.server || "https://ntfy.sh", required: true })
    ),
    h("label", {},
      h("span", {}, "Notification topic",
        h("span", { class: "hint" }, " — same one your phone's ntfy app subscribes to")
      ),
      h("input", { name: "notifTopic", type: "text", placeholder: "e.g. john-teams-fwd-a7x92k", value: existing.notifTopic || "", required: true, autocomplete: "off" })
    ),
    h("label", {},
      h("span", {}, "Reply topic",
        h("span", { class: "hint" }, " — separate topic for replies (same as extension popup)")
      ),
      h("input", { name: "replyTopic", type: "text", placeholder: "e.g. nasdaq-reply-from-harsh", value: existing.replyTopic || "", required: true, autocomplete: "off" })
    ),
    h("label", {},
      h("span", {}, "Shared secret",
        h("span", { class: "hint" }, " — same secret you set in the extension popup")
      ),
      h("input", { name: "secret", type: "text", placeholder: "auto-generated value from extension", value: existing.secret || "", required: true, autocomplete: "off" })
    ),
    h("div", { class: "row" },
      h("button", { type: "submit" }, "💾 Save & connect"),
      existing.notifTopic ? h("button", { type: "button", class: "ghost", onclick: () => render() }, "Cancel") : null
    ),
    h("div", { id: "setupMsg", class: "msg" })
  );

  root.append(
    h("div", { id: "setup" },
      h("h1", {}, "📺 Teams Notifier"),
      h("p", { class: "intro" },
        "Type the same ntfy server / topic / secret you configured in the desktop extension. ",
        "Everything is stored locally on this device (no server, no account). ",
        "Read your Teams notifications and reply to them — your desktop browser does the actual typing into Teams."
      ),
      form
    )
  );
}

function handleSetupSubmit(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const cfg = {
    server:     (fd.get("server")     || "").trim().replace(/\/$/, "") || "https://ntfy.sh",
    notifTopic: (fd.get("notifTopic") || "").trim(),
    replyTopic: (fd.get("replyTopic") || "").trim(),
    secret:     (fd.get("secret")     || "").trim()
  };
  if (!cfg.notifTopic || !cfg.replyTopic) {
    $("setupMsg").textContent = "Notification topic and reply topic are required.";
    $("setupMsg").className = "msg err";
    return;
  }
  if (cfg.notifTopic === cfg.replyTopic) {
    $("setupMsg").textContent = "Reply topic must be different from the notification topic.";
    $("setupMsg").className = "msg err";
    return;
  }
  saveCfg(cfg);
  state.cfg = cfg;
  render();
  boot();
}

/* ----- App layout ----- */

function renderApp() {
  // Build shell once if not present
  if (!$("app")) {
    root.innerHTML = "";
    root.append(buildAppShell());
    bindAppEvents();
  }
  renderSidebar();
  renderMain();
}

function buildAppShell() {
  return h("div", { id: "app" },
    // Sidebar
    h("aside", { class: "sidebar" },
      h("header", { class: "sidebar-head" },
        h("div", { class: "row" },
          h("h1", {}, "📺 Teams Notifier"),
          h("button", { id: "closeSidebar", class: "ghost mobile-only", "aria-label": "Hide chat list" }, "✕")
        ),
        h("div", { class: "pills" },
          h("span", { id: "connPill", class: "pill" }, "⏳ connecting"),
          h("button", { id: "settingsBtn", class: "ghost", title: "Re-enter ntfy config", style: { padding: "3px 8px", fontSize: "11px" } }, "⚙ settings")
        )
      ),
      h("div", { class: "toolbar" },
        h("input", { id: "search", type: "search", placeholder: "Search chats…", "aria-label": "Search chats" }),
        h("button", { id: "wipeBtn", class: "ghost", title: "Wipe local cache" }, "🗑")
      ),
      h("ul", { id: "chatList", class: "chat-list" }),
      h("footer", { class: "sidebar-foot" },
        h("small", { id: "counts" }, "0 chats · 0 messages")
      )
    ),
    // Main
    h("main", { class: "main" },
      h("header", { class: "main-head" },
        h("button", { id: "openSidebar", class: "ghost mobile-only", "aria-label": "Show chat list" }, "☰"),
        h("div", { class: "main-title" },
          h("h2", { id: "chatTitle" }, "Select a chat"),
          h("p", { id: "chatMeta", class: "meta" })
        ),
        h("div", { class: "head-actions" },
          h("a", { id: "openInTeams", class: "ghost", hidden: true, target: "_blank", rel: "noopener" }, "↗ Teams")
        )
      ),
      h("section", { id: "messages", class: "messages" }),
      h("form", { id: "composer", class: "composer", hidden: true },
        h("textarea", { id: "replyText", rows: "2", placeholder: "Type a reply… (Ctrl/Cmd+Enter to send)", "aria-label": "Reply text" }),
        h("div", { class: "composer-actions" },
          h("span", { id: "status", class: "status" }),
          h("button", { id: "sendBtn", type: "submit" }, "Send to Teams")
        )
      )
    )
  );
}

function bindAppEvents() {
  $("search").addEventListener("input", (e) => {
    state.search = e.target.value.trim().toLowerCase();
    renderSidebar();
  });
  $("wipeBtn").addEventListener("click", () => {
    if (!confirm("Wipe the locally-cached history on this device? Your ntfy topic is untouched.")) return;
    state.messages.clear();
    state.chats.clear();
    state.outgoing = [];
    state.selected = null;
    localStorage.removeItem(KEY_MSGS);
    localStorage.removeItem(KEY_OUT);
    renderApp();
  });
  $("settingsBtn").addEventListener("click", () => {
    renderSetup();
  });
  $("composer").addEventListener("submit", onComposerSubmit);
  $("replyText").addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); $("composer").requestSubmit(); }
  });

  // Mobile sidebar toggle
  $("openSidebar").addEventListener("click", () => document.body.classList.add("show-sidebar"));
  $("closeSidebar").addEventListener("click", () => document.body.classList.remove("show-sidebar"));
  document.addEventListener("click", (e) => {
    if (!isMobile() || !document.body.classList.contains("show-sidebar")) return;
    const sidebar = document.querySelector(".sidebar");
    if (sidebar.contains(e.target)) return;
    if ($("openSidebar")?.contains(e.target)) return;
    document.body.classList.remove("show-sidebar");
  });
  // Default to sidebar visible on mobile until user picks a chat
  if (isMobile() && !state.selected) {
    document.body.classList.add("show-sidebar");
  }
}

function renderSidebar() {
  const pill = $("connPill");
  if (pill) {
    if (state.connState === "ok")          { pill.textContent = "● live";       pill.className = "pill ok"; }
    else if (state.connState === "err")    { pill.textContent = "○ " + (state.connErr || "offline"); pill.className = "pill err"; }
    else if (state.connState === "connecting") { pill.textContent = "⏳ connecting"; pill.className = "pill"; }
    else                                   { pill.textContent = "⏳ starting";   pill.className = "pill"; }
  }

  const list = $("chatList");
  list.innerHTML = "";
  const term = state.search;
  let chatN = 0, msgN = state.messages.size;
  for (const c of chatsSnapshot()) {
    if (term && !c.name.toLowerCase().includes(term) && !(c.lastBody || "").toLowerCase().includes(term)) continue;
    chatN++;
    const li = h("li", {
      class: "chat-item" + (c.chatKey === state.selected ? " active" : ""),
      onclick: () => selectChat(c.chatKey)
    },
      h("span", { class: "avatar" }, initials(c.name)),
      h("span", { class: "chat-body" },
        h("span", { class: "chat-name" }, c.name),
        h("span", { class: "chat-preview" }, (c.lastSender ? c.lastSender + ": " : "") + (c.lastBody || ""))
      ),
      h("span", { class: "chat-side" },
        h("span", { class: "chat-time" }, fmtTime(c.lastTs)),
        c.unread ? h("span", { class: "unread" }, String(c.unread)) : null
      )
    );
    list.append(li);
  }
  $("counts").textContent = `${chatN} chats · ${msgN} messages`;
}

function renderMain() {
  const key = state.selected;
  const chatTitle = $("chatTitle");
  const chatMeta  = $("chatMeta");
  const composer  = $("composer");
  const openTeams = $("openInTeams");
  const wrap      = $("messages");

  if (!key) {
    chatTitle.textContent = "Select a chat";
    chatMeta.textContent  = "";
    composer.hidden = true;
    openTeams.hidden = true;
    wrap.innerHTML = "";
    wrap.append(h("div", { class: "empty" },
      h("h3", {}, state.messages.size ? "Pick a chat from the list" : "Waiting for the first message…"),
      h("p", {}, state.messages.size
        ? "Tap a chat on the left to see its history and reply."
        : "When your desktop captures a Teams notification, it'll appear here within a second.")
    ));
    return;
  }

  const chat = state.chats.get(key);
  const msgs = messagesForChat(key);

  chatTitle.textContent = chat?.name || key;
  chatMeta.textContent  = msgs.length
    ? `${msgs.filter(m=>m._kind==='in').length} messages · last ${fmtTime(msgs[msgs.length-1].ts)}`
    : "no messages yet";
  if (chat?.chatUrl) { openTeams.hidden = false; openTeams.href = chat.chatUrl; }
  else openTeams.hidden = true;
  composer.hidden = false;

  wrap.innerHTML = "";
  if (msgs.length === 0) {
    wrap.append(h("div", { class: "empty" },
      h("h3", {}, "No messages yet in this chat"),
      h("p", {}, "Send one below — it'll be typed into Teams by your desktop browser.")
    ));
    return;
  }
  let lastDay = "";
  for (const m of msgs) {
    const day = dayLabel(m.ts);
    if (day !== lastDay) {
      wrap.append(h("div", { class: "day-divider" }, day));
      lastDay = day;
    }
    wrap.append(h("div", { class: "msg" + (m._kind === "out" ? " out" : "") },
      h("div", { class: "who" }, m._kind === "out" ? "You" : (m.sender || "Teams")),
      h("div", { class: "body" }, m.body || m.text || ""),
      h("div", { class: "when" },
        h("span", {}, new Date(m.ts).toLocaleString()),
        m._kind === "in"  ? null : h("span", { class: "tag" }, m.status || "sent")
      )
    ));
  }
  wrap.scrollTop = wrap.scrollHeight;
}

/* ----- Selection ----- */

function selectChat(key) {
  state.selected = key;
  const c = state.chats.get(key);
  if (c) c.unread = 0;
  if (isMobile()) document.body.classList.remove("show-sidebar");
  setStatus("");
  renderSidebar();
  renderMain();
  if (!isMobile()) setTimeout(() => $("replyText")?.focus(), 50);
}

/* ----- Compose / send ----- */

function setStatus(msg, cls = "") {
  const s = $("status");
  if (!s) return;
  s.textContent = msg || "";
  s.className = "status" + (cls ? " " + cls : "");
}

async function onComposerSubmit(e) {
  e.preventDefault();
  const ta = $("replyText");
  const text = ta.value.trim();
  if (!text || !state.selected) return;
  const chat = state.chats.get(state.selected);
  const btn  = $("sendBtn");
  btn.disabled = true;

  const out = {
    id: "out-" + Date.now(),
    ts: Date.now(),
    chatKey: state.selected,
    chatUrl: chat?.chatUrl || null,
    name:    chat?.name || null,
    text,
    status:  "sending…"
  };
  state.outgoing.push(out);
  saveOut(state.outgoing);
  renderMain();
  setStatus("Publishing reply to ntfy…", "wait");

  try {
    await publishReply(state.cfg, out.chatUrl, out.name, out.text);
    out.status = "sent ✓ (desktop should type it in a sec)";
    setStatus("Sent ✓ — your desktop will type it into Teams in ~1s.", "ok");
    ta.value = "";
  } catch (err) {
    out.status = "failed: " + err.message;
    setStatus("Failed: " + err.message, "err");
  }
  saveOut(state.outgoing);
  renderMain();
  btn.disabled = false;
  if (!isMobile()) ta.focus();
}

/* ─────────────────────────────────────────────────────────────────────────
 *  Bootstrap
 * ───────────────────────────────────────────────────────────────────────── */

function boot() {
  if (!state.cfg) return;
  startSubscribe(state.cfg,
    (evt) => {
      const m = parseEvent(evt);
      if (!m) return;
      if (ingest(m)) {
        persistMessages();
        renderSidebar();
        if (state.selected === m.chatKey) renderMain();
      }
    },
    (kind, err) => {
      state.connState = kind;
      state.connErr = err || "";
      if ($("connPill")) renderSidebar();
    }
  );
}

(function init() {
  try {
    state.cfg = captureUrlConfig() || loadCfg();
    hydrateFromCache();
    render();

    // Auto-select a chat if passed via URL (clicking a notification from the extension)
    if (state.cfg && state.cfg.notifTopic) {
      const q = new URLSearchParams(location.search);
      const wantChat = q.get("chat");
      const wantName = q.get("name");
      if (wantChat || wantName) {
        const hit =
          (wantChat && state.chats.get(wantChat)) ||
          (wantName && [...state.chats.values()].find((c) => c.name === wantName));
        if (hit) {
          selectChat(hit.chatKey);
        } else if (wantName) {
          // Pre-create a stub chat so the user can compose to a sender we
          // haven't received any messages from yet.
          const key = wantChat || wantName;
          state.chats.set(key, {
            chatKey: key, name: wantName, count: 0,
            lastTs: Date.now(), lastBody: "(starting new chat)",
            chatUrl: wantChat || null, unread: 0
          });
          renderSidebar();
          selectChat(key);
        }
      }
      boot();
    }
  } catch (err) {
    console.error("[TN] init failed:", err);
    showBootError(err);
  }
})();

// Surface unexpected errors visibly (so the page is never blank without
// telling you why).
window.addEventListener("error", (e) => {
  console.error("[TN] window error:", e.error || e.message);
  if (!state.cfg) showBootError(e.error || e.message);
});
window.addEventListener("unhandledrejection", (e) => {
  console.error("[TN] unhandled rejection:", e.reason);
  if (!state.cfg) showBootError(e.reason);
});

function showBootError(err) {
  const msg = (err && err.stack) ? err.stack : String(err);
  const root = document.getElementById("root");
  if (!root) return;
  root.innerHTML = "";
  const box = document.createElement("div");
  box.style.cssText = "max-width:560px;margin:60px auto;padding:24px;font:14px/1.5 -apple-system,sans-serif;color:#1f1f23;background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.08);";
  box.innerHTML =
    '<div style="font-size:36px;text-align:center;">⚠</div>' +
    '<h1 style="color:#c93939;font-size:18px;text-align:center;margin:8px 0 16px;">The phone page hit an error on load</h1>' +
    '<p>Most common causes (in order):</p>' +
    '<ol>' +
      '<li>The files are in a <code>/pages</code> subdirectory of your GitHub repo. GitHub Pages serves from the repo <strong>root</strong> (or <code>/docs</code>). Move <code>index.html</code> and <code>manifest.webmanifest</code> to the repo root, or rename the folder to <code>docs</code> and select that in Settings → Pages.</li>' +
      '<li>Your browser blocked the script (very strict content-blocker, ancient browser).</li>' +
      '<li>An actual bug in this page — copy the trace below and open an issue.</li>' +
    '</ol>' +
    '<details style="margin-top:16px;"><summary>Technical details</summary>' +
    '<pre style="background:#f3f4fb;padding:12px;border-radius:6px;overflow:auto;font-size:12px;">' +
    msg.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])) +
    '</pre></details>';
  root.appendChild(box);
}

// Re-render on tab visibility return so timestamps look fresh
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && state.cfg) renderSidebar();
});
</script>
